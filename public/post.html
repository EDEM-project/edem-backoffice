<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEM — Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">EDEM</span>
          <span class="logo-sub">Agritech · Satellite · IA</span>
        </div>
        <nav>
          <a href="/" class="nav-link">← Actualités</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <article id="post-content" class="post-full">
        <div class="loading">Chargement…</div>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Projet EDEM · ETIS Laboratory · CY Cergy Paris Université</p>
    </div>
  </footer>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const container = document.getElementById('post-content');

      if (!id) {
        container.innerHTML = `<p class="empty error">Article introuvable.</p>`;
        return;
      }

      try {
        const res = await fetch(`/api/posts/${id}`);
        if (!res.ok) throw new Error();
        const post = await res.json();

        document.title = `EDEM — ${post.title}`;

        container.innerHTML = `
          <div class="post-full-meta">
            <span class="post-author">${post.author_name}</span>
            <span class="post-date">${formatDate(post.created_at)}</span>
          </div>
          <h1 class="post-full-title">${escapeHtml(post.title)}</h1>
          <div class="post-full-body">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
        `;
      } catch {
        container.innerHTML = `<p class="empty error">Impossible de charger cet article.</p>`;
      }
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('fr-FR', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadPost();
  </script>
</body>
</html>
