<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
  <title>EDEM – Chercheur</title>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col">

  <header id="site-header" role="banner" class="sticky top-0 z-[100] bg-[#6ee7b7]/80 border-b border-black/5 backdrop-blur-md transition-shadow duration-300">
    <nav aria-label="Navigation principale" class="max-w-screen-xl mx-auto px-10 h-20 flex items-center justify-between gap-8">
      <a href="index.html" class="flex items-center gap-[0.6rem] shrink-0 no-underline">
        <span class="font-sans font-extrabold text-xl text-stone-900 tracking-[-0.02em]">EDEM</span>
      </a>
      <ul class="hidden md:flex items-center gap-1 list-none" role="list">
        <li><a href="index.html#projet" class="block px-[0.85rem] py-2 text-sm text-stone-800 no-underline rounded-[6px] hover:bg-black/5 transition-all">Le projet</a></li>
        <li><a href="publications.html" class="block px-[0.85rem] py-2 text-sm text-stone-800 no-underline rounded-[6px] hover:bg-black/5 transition-all">Publications</a></li>
        <li><a href="equipe.html" class="block px-[0.85rem] py-2 text-sm text-stone-800 no-underline rounded-[6px] hover:bg-black/5 transition-all">Équipe</a></li>
        <li><a href="contact.html" class="block px-[0.85rem] py-2 text-sm text-stone-800 no-underline rounded-[6px] hover:bg-black/5 transition-all">Contact</a></li>
      </ul>
      <div class="flex items-center gap-4 shrink-0">
        <a href="https://anr.fr/Projet-ANR-24-CE23-6449" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-[0.4rem] px-4 py-[0.55rem] bg-teal-700 text-white text-[0.8125rem] font-semibold rounded-[7px] no-underline hover:bg-teal-800 transition-all">
          Fiche ANR
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 9.5L9.5 2.5M9.5 2.5H4.5M9.5 2.5V7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div class="flex items-center gap-1 text-[0.75rem] font-medium">
          <button class="bg-transparent border-none cursor-pointer px-[0.3rem] py-[0.2rem] rounded text-stone-900 font-bold text-[0.75rem]">FR</button>
          <span class="text-black/30">|</span>
          <button class="bg-transparent border-none cursor-pointer px-[0.3rem] py-[0.2rem] rounded text-black/45 text-[0.75rem]">EN</button>
        </div>
      </div>
    </nav>
  </header>

  <main id="main-content" class="flex-1 w-full max-w-screen-xl mx-auto px-8 md:px-20 py-12 flex flex-col gap-12">
    <div class="text-stone-400 text-sm">Chargement…</div>
  </main>

  <footer class="bg-teal-600 mt-10">
    <div class="max-w-screen-xl mx-auto px-8 py-12 grid grid-cols-1 md:grid-cols-3 gap-12 items-start">
      <div class="flex flex-col gap-6"><span class="text-white text-2xl font-bold tracking-tight">EDEM</span></div>
      <nav class="flex flex-col gap-3 pt-1">
        <a href="#" class="text-white/80 text-sm font-medium hover:text-white transition-colors">Mentions légales</a>
        <a href="equipe.html" class="text-white/80 text-sm font-medium hover:text-white transition-colors">Équipe</a>
      </nav>
      <div class="flex flex-col gap-4">
        <h3 class="text-white text-lg font-semibold">Rester informé</h3>
        <div class="flex gap-2">
          <input type="email" placeholder="Votre email" class="flex-1 min-w-0 h-11 px-4 bg-transparent border border-white/50 rounded text-white placeholder-white/50 text-sm focus:outline-none focus:border-white transition-colors"/>
          <button class="px-5 h-11 bg-white rounded text-teal-700 text-sm font-semibold hover:bg-green-50 transition-colors">Envoyer</button>
        </div>
      </div>
    </div>
    <div class="border-t border-white/20">
      <div class="max-w-screen-xl mx-auto px-8 py-4">
        <p class="text-white/40 text-xs">© 2026 EDEM – Projet ANR. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    function fmt(d) {
      return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function load() {
      const main = document.getElementById('main-content');
      if (!userId) {
        main.innerHTML = `<p class="text-stone-400">Chercheur introuvable.</p>`;
        return;
      }

      try {
        const [resUser, resPubs] = await Promise.all([
          fetch(`/api/users/${userId}`),
          fetch('/api/publications')
        ]);

        if (!resUser.ok) throw new Error();
        const u = await resUser.json();
        const allPubs = await resPubs.json();
        const userPubs = allPubs.filter(p => p.author_id === u.id);

        document.title = `EDEM – ${u.name}`;

        main.innerHTML = `
          <!-- PROFIL -->
          <div class="flex items-center gap-10 flex-wrap">
            <div class="w-48 h-48 shrink-0 rounded-full overflow-hidden bg-green-100 flex items-center justify-center border-2 border-stone-200">
              ${u.photo_url
                ? `<img src="${esc(u.photo_url)}" alt="Portrait de ${esc(u.name)}" class="w-full h-full object-cover">`
                : `<span class="text-emerald-900 text-5xl font-bold">${initials(u.name)}</span>`
              }
            </div>
            <div class="flex flex-col gap-4">
              <div>
                <h1 class="text-stone-900 text-4xl font-bold">${esc(u.name)}</h1>
                ${u.titre ? `<p class="text-stone-400 text-xl font-normal mt-1">${esc(u.titre)}</p>` : ''}
                ${u.institution ? `<p class="text-stone-500 text-sm mt-1">${esc(u.institution)}</p>` : ''}
              </div>
              ${u.competences && u.competences.length > 0 ? `
              <div class="flex flex-wrap gap-2">
                ${u.competences.map(c => `<span class="px-4 py-1.5 bg-green-100 border border-emerald-900 rounded-full text-emerald-900 text-sm font-normal">${esc(c)}</span>`).join('')}
              </div>` : ''}
              <div class="flex items-center gap-4">
                ${u.email_public ? `
                <a href="mailto:${esc(u.email_public)}" class="text-stone-400 hover:text-teal-600 transition-colors flex items-center gap-1.5 text-sm">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
                  ${esc(u.email_public)}
                </a>` : ''}
                ${u.linkedin_url ? `
                <a href="${esc(u.linkedin_url)}" target="_blank" class="text-stone-400 hover:text-teal-600 transition-colors flex items-center gap-1.5 text-sm">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                  LinkedIn
                </a>` : ''}
              </div>
            </div>
          </div>

          ${u.bio ? `
          <!-- PRÉSENTATION -->
          <section>
            <h2 class="text-stone-900 text-2xl font-bold mb-3">PRÉSENTATION</h2>
            <p class="text-stone-700 text-base font-light leading-relaxed max-w-3xl">${esc(u.bio)}</p>
          </section>` : ''}

          <!-- PUBLICATIONS -->
          <section id="publications">
            <h2 class="text-stone-900 text-2xl font-bold mb-6">
              PUBLICATIONS RÉCENTES
              ${userPubs.length > 0 ? `<span class="text-base font-normal text-stone-400 ml-2">(${userPubs.length})</span>` : ''}
            </h2>
            ${userPubs.length === 0
              ? `<p class="text-stone-400 text-sm">Aucune publication pour le moment.</p>`
              : `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  ${userPubs.map(p => `
                  <div class="w-full bg-white border border-teal-600 rounded-lg p-4 flex flex-col gap-3 cursor-pointer hover:shadow-md transition-shadow"
                       onclick="window.location.href='publication.html?id=${p.id}'">
                    <div class="flex flex-col gap-1">
                      <p class="text-stone-900 text-base font-semibold">${esc(p.title)}</p>
                      <p class="text-stone-400 text-sm font-light">le ${fmt(p.created_at)}</p>
                      <p class="text-stone-700 text-sm font-light leading-snug">
                        ${esc(p.summary).substring(0, 120)}${p.summary && p.summary.length > 120 ? '…' : ''}
                      </p>
                    </div>
                    <div class="flex justify-between items-center">
                      ${p.pdf_url ? `
                      <a href="${esc(p.pdf_url)}" target="_blank" onclick="event.stopPropagation()"
                         class="w-10 h-10 border border-teal-600 rounded flex items-center justify-center shrink-0 hover:bg-teal-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-teal-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                          <polyline points="14 2 14 8 20 8"/>
                        </svg>
                      </a>` : '<div></div>'}
                      <span class="text-teal-600 text-sm font-light hover:underline">Consulter →</span>
                    </div>
                  </div>`).join('')}
                </div>`
            }
          </section>
        `;
      } catch {
        main.innerHTML = `<p class="text-stone-400">Impossible de charger ce profil.</p>`;
      }
    }

    load();
  </script>
</body>
</html>
