<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEM — Actualité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">EDEM <span>Espace équipe</span></div>
      <a href="/admin/dashboard.html" class="sidebar-link">Publications</a>
      <a href="/admin/new-publication.html" class="sidebar-link">Nouvelle publication</a>
      <a href="/admin/news.html" class="sidebar-link">Actualités</a>
      <a href="/admin/new-news.html" class="sidebar-link active">Nouvelle actualité</a>
      <div id="admin-links"></div>
      <div class="sidebar-bottom">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);padding:0 12px;margin-bottom:10px" id="sidebar-user"></div>
        <a href="/" class="sidebar-link">← Site public</a>
        <button class="sidebar-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;color:rgba(255,255,255,0.4)" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h1 class="admin-title" id="page-title">Nouvelle actualité</h1>
        <a href="/admin/news.html" class="btn btn-ghost">Annuler</a>
      </div>

      <div style="max-width:720px;display:flex;flex-direction:column;gap:0">

        <div class="form-group">
          <label class="form-label">Titre *</label>
          <input class="form-input" type="text" id="title" placeholder="Titre de l'actualité">
        </div>

        <div class="form-group">
          <label class="form-label">Date de publication</label>
          <input class="form-input" type="date" id="published_at">
        </div>

        <div class="form-group">
          <label class="form-label">Contenu * <span style="font-weight:400;color:var(--text-muted)">(séparer les paragraphes par une ligne vide)</span></label>
          <textarea class="form-textarea" id="content" placeholder="Texte de l'actualité…" style="min-height:240px"></textarea>
        </div>

        <div style="border-top:2px solid var(--border);margin-top:20px;padding-top:24px">
          <h2 style="font-family:var(--font-display);font-size:14px;color:var(--text-muted);margin-bottom:20px;text-transform:uppercase;letter-spacing:0.05em">Version anglaise <span style="font-weight:400;text-transform:none">(optionnelle — si vide, la version française s'affiche)</span></h2>

          <div class="form-group">
            <label class="form-label">Title (EN)</label>
            <input class="form-input" type="text" id="title_en" placeholder="English title">
          </div>

          <div class="form-group">
            <label class="form-label">Content (EN)</label>
            <textarea class="form-textarea" id="content_en" placeholder="English content…" style="min-height:240px"></textarea>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Image <span style="font-weight:400;color:var(--text-muted)">(URL ou upload ci-dessous)</span></label>
          <input class="form-input" type="text" id="image_url" placeholder="/uploads/… ou https://…">
        </div>

        <div class="form-group">
          <label class="form-label">Upload image</label>
          <input type="file" id="file-upload" accept="image/*" style="font-size:14px;color:var(--text-muted)">
          <div id="upload-status" style="font-size:13px;color:var(--text-muted);margin-top:6px"></div>
        </div>

        <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
          <button class="btn btn-primary" id="submit-btn" onclick="save()">Publier</button>
          <span id="save-status" style="font-size:13px;color:var(--text-muted)"></span>
        </div>

      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('edem_token');
    const user = JSON.parse(localStorage.getItem('edem_user') || 'null');
    if (!token || !user) window.location.href = '/admin/login.html';

    document.getElementById('sidebar-user').textContent = user?.name || '';
    if (user?.role === 'admin') {
      document.getElementById('admin-links').innerHTML = `<a href="/admin/users.html" class="sidebar-link">Gérer les comptes</a>`;
    }

    // Default date to today
    document.getElementById('published_at').value = new Date().toISOString().slice(0, 10);

    const params = new URLSearchParams(window.location.search);
    const editId = params.get('id');

    if (editId) {
      document.getElementById('page-title').textContent = 'Modifier l\'actualité';
      document.getElementById('submit-btn').textContent = 'Enregistrer';
      fetch(`/api/news/${editId}`).then(r => r.json()).then(item => {
        document.getElementById('title').value = item.title || '';
        document.getElementById('content').value = item.content || '';
        document.getElementById('image_url').value = item.image_url || '';
        document.getElementById('title_en').value = item.title_en || '';
        document.getElementById('content_en').value = item.content_en || '';
        if (item.published_at) {
          document.getElementById('published_at').value = item.published_at.slice(0, 10);
        }
      });
    }

    document.getElementById('file-upload').addEventListener('change', async function() {
      const file = this.files[0];
      if (!file) return;
      const status = document.getElementById('upload-status');
      status.textContent = 'Upload en cours…';
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form });
        const data = await res.json();
        if (res.ok && data.type === 'image') {
          document.getElementById('image_url').value = data.url;
          status.textContent = `✓ Image uploadée : ${data.url}`;
        } else {
          status.textContent = data.error || 'Erreur upload.';
        }
      } catch {
        status.textContent = 'Erreur réseau.';
      }
    });

    async function save() {
      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('save-status');
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!title || !content) {
        status.textContent = 'Le titre et le contenu sont requis.';
        status.style.color = '#c0392b';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Enregistrement…';
      status.style.color = 'var(--text-muted)';

      const dateVal = document.getElementById('published_at').value;
      const body = {
        title,
        content,
        image_url: document.getElementById('image_url').value.trim(),
        published_at: dateVal ? dateVal + ' 00:00:00' : undefined,
        title_en: document.getElementById('title_en').value.trim(),
        content_en: document.getElementById('content_en').value.trim(),
      };

      try {
        const url = editId ? `/api/news/${editId}` : '/api/news';
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          window.location.href = '/admin/news.html';
        } else {
          const data = await res.json();
          status.textContent = data.error || 'Erreur.';
          status.style.color = '#c0392b';
          btn.disabled = false;
        }
      } catch {
        status.textContent = 'Erreur réseau.';
        status.style.color = '#c0392b';
        btn.disabled = false;
      }
    }

    function logout() { localStorage.clear(); window.location.href = '/admin/login.html'; }
  </script>
</body>
</html>
