<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEM — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">EDEM <span>Espace équipe</span></div>
      <a href="/admin/dashboard.html" class="sidebar-link active">Publications</a>
      <a href="/admin/new-publication.html" class="sidebar-link">Nouvelle publication</a>
      <div id="admin-links"></div>
      <div class="sidebar-bottom">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);padding:0 12px;margin-bottom:10px" id="sidebar-user"></div>
        <a href="/" class="sidebar-link">← Site public</a>
        <button class="sidebar-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;color:rgba(255,255,255,0.4)" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h1 class="admin-title">Publications</h1>
        <a href="/admin/new-publication.html" class="btn btn-primary">+ Nouvelle publication</a>
      </div>
      <div id="pub-list"><div class="loading">Chargement…</div></div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('edem_token');
    const user = JSON.parse(localStorage.getItem('edem_user') || 'null');
    if (!token || !user) window.location.href = '/admin/login.html';

    document.getElementById('sidebar-user').textContent = user?.name || '';
    if (user?.role === 'admin') {
      document.getElementById('admin-links').innerHTML = `<a href="/admin/users.html" class="sidebar-link">Gérer les comptes</a>`;
    }

    async function load() {
      const list = document.getElementById('pub-list');
      try {
        const res = await fetch('/api/publications');
        const pubs = await res.json();
        if (pubs.length === 0) {
          list.innerHTML = `<div class="empty">Aucune publication. <a href="/admin/new-publication.html" style="color:var(--accent)">Créer la première →</a></div>`;
          return;
        }
        list.innerHTML = pubs.map(pub => {
          const canEdit = pub.author_id === user.id || user.role === 'admin';
          return `
            <div class="admin-post-item">
              <div class="admin-post-info">
                <div class="admin-post-title">${esc(pub.title)}</div>
                <div class="admin-post-meta">${esc(pub.author_name)} · ${fmt(pub.created_at)} · <em>${pub.type}</em></div>
              </div>
              <div class="admin-post-actions">
                ${canEdit ? `
                  <a href="/admin/new-publication.html?id=${pub.id}" class="btn btn-ghost btn-sm">Modifier</a>
                  <button class="btn btn-danger btn-sm" onclick="del(${pub.id}, this)">Supprimer</button>
                ` : ''}
              </div>
            </div>`;
        }).join('');
      } catch {
        list.innerHTML = `<div class="empty error">Erreur de chargement.</div>`;
      }
    }

    async function del(id, btn) {
      if (!confirm('Supprimer cette publication ?')) return;
      btn.disabled = true;
      const res = await fetch(`/api/publications/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) load(); else btn.disabled = false;
    }

    function logout() { localStorage.clear(); window.location.href = '/admin/login.html'; }
    function fmt(d) { return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    load();
  </script>
</body>
</html>
