<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEM — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        EDEM
        <span>Espace équipe</span>
      </div>
      <a href="/admin/dashboard.html" class="sidebar-link active">Mes posts</a>
      <a href="/admin/new-post.html" class="sidebar-link">Nouveau post</a>
      <div id="admin-links"></div>
      <div class="sidebar-bottom">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);padding:0 12px;margin-bottom:10px" id="sidebar-user"></div>
        <a href="/" class="sidebar-link">← Site public</a>
        <button class="sidebar-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;color:rgba(255,255,255,0.4)" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h1 class="admin-title">Actualités</h1>
        <a href="/admin/new-post.html" class="btn btn-primary">+ Nouveau post</a>
      </div>

      <div id="posts-list">
        <div class="loading">Chargement…</div>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('edem_token');
    const user = JSON.parse(localStorage.getItem('edem_user') || 'null');

    if (!token || !user) window.location.href = '/admin/login.html';

    document.getElementById('sidebar-user').textContent = user?.name || '';

    if (user?.role === 'admin') {
      document.getElementById('admin-links').innerHTML = `
        <a href="/admin/users.html" class="sidebar-link">Gérer les comptes</a>
      `;
    }

    async function loadPosts() {
      const list = document.getElementById('posts-list');
      try {
        const res = await fetch('/api/posts');
        const posts = await res.json();

        if (posts.length === 0) {
          list.innerHTML = `<div class="empty">Aucun post publié. <a href="/admin/new-post.html" style="color:var(--accent)">Créer le premier →</a></div>`;
          return;
        }

        list.innerHTML = posts.map(post => {
          const canEdit = post.author_id === user.id || user.role === 'admin';
          return `
            <div class="admin-post-item">
              <div class="admin-post-info">
                <div class="admin-post-title">${escapeHtml(post.title)}</div>
                <div class="admin-post-meta">${post.author_name} · ${formatDate(post.created_at)}</div>
              </div>
              <div class="admin-post-actions">
                ${canEdit ? `
                  <a href="/admin/new-post.html?id=${post.id}" class="btn btn-ghost btn-sm">Modifier</a>
                  <button class="btn btn-danger btn-sm" onclick="deletePost(${post.id}, this)">Supprimer</button>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch {
        list.innerHTML = `<div class="empty error">Impossible de charger les posts.</div>`;
      }
    }

    async function deletePost(id, btn) {
      if (!confirm('Supprimer ce post ?')) return;
      btn.disabled = true;
      try {
        const res = await fetch(`/api/posts/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) loadPosts();
        else {
          const data = await res.json();
          alert(data.error || 'Erreur lors de la suppression.');
          btn.disabled = false;
        }
      } catch {
        alert('Erreur réseau.');
        btn.disabled = false;
      }
    }

    function logout() {
      localStorage.removeItem('edem_token');
      localStorage.removeItem('edem_user');
      window.location.href = '/admin/login.html';
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadPosts();
  </script>
</body>
</html>
