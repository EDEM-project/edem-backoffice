<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEM — Éditeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">EDEM <span>Espace équipe</span></div>
      <a href="/admin/dashboard.html" class="sidebar-link">Publications</a>
      <a href="/admin/new-publication.html" class="sidebar-link active">Nouvelle publication</a>
      <div id="admin-links"></div>
      <div class="sidebar-bottom">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);padding:0 12px;margin-bottom:10px" id="sidebar-user"></div>
        <a href="/" class="sidebar-link">← Site public</a>
        <button class="sidebar-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;color:rgba(255,255,255,0.4)" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h1 class="admin-title" id="page-title">Nouvelle publication</h1>
        <a href="/admin/dashboard.html" class="btn btn-ghost">Annuler</a>
      </div>

      <div style="max-width:720px;display:flex;flex-direction:column;gap:0">

        <div class="form-group">
          <label class="form-label">Titre *</label>
          <input class="form-input" type="text" id="title" placeholder="Titre de la publication">
        </div>

        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-input" id="type">
            <option value="recherche">Recherche</option>
            <option value="rapport">Rapport</option>
            <option value="article">Article</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Résumé * <span style="font-weight:400;color:var(--text-muted)">(affiché en avant, vulgarisé)</span></label>
          <textarea class="form-textarea" id="summary" placeholder="Résumé accessible au grand public…" style="min-height:100px"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Explication <span style="font-weight:400;color:var(--text-muted)">(corps de la publication, séparer les paragraphes par une ligne vide)</span></label>
          <textarea class="form-textarea" id="explanation" placeholder="Explication détaillée…" style="min-height:200px"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Extrait de code <span style="font-weight:400;color:var(--text-muted)">(optionnel)</span></label>
          <textarea class="form-textarea" id="code_snippet" placeholder="Collez votre code ici…" style="min-height:120px;font-family:monospace;font-size:13px"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Langage du code</label>
          <input class="form-input" type="text" id="code_language" placeholder="Python, JavaScript, R…" value="Python">
        </div>

        <div class="form-group">
          <label class="form-label">Tags <span style="font-weight:400;color:var(--text-muted)">(séparés par des virgules)</span></label>
          <input class="form-input" type="text" id="tags" placeholder="xAI, Deep Learning, Agritech">
        </div>

        <div class="form-group">
          <label class="form-label">Lien PDF <span style="font-weight:400;color:var(--text-muted)">(URL externe ou chemin /uploads/…)</span></label>
          <input class="form-input" type="text" id="pdf_url" placeholder="https://… ou /uploads/fichier.pdf">
        </div>

        <div class="form-group">
          <label class="form-label">Upload PDF ou image</label>
          <input type="file" id="file-upload" accept=".pdf,image/*" style="font-size:14px;color:var(--text-muted)">
          <div id="upload-status" style="font-size:13px;color:var(--text-muted);margin-top:6px"></div>
        </div>

        <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
          <button class="btn btn-primary" id="submit-btn" onclick="save()">Publier</button>
          <span id="save-status" style="font-size:13px;color:var(--text-muted)"></span>
        </div>

      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('edem_token');
    const user = JSON.parse(localStorage.getItem('edem_user') || 'null');
    if (!token || !user) window.location.href = '/admin/login.html';

    document.getElementById('sidebar-user').textContent = user?.name || '';
    if (user?.role === 'admin') {
      document.getElementById('admin-links').innerHTML = `<a href="/admin/users.html" class="sidebar-link">Gérer les comptes</a>`;
    }

    const params = new URLSearchParams(window.location.search);
    const editId = params.get('id');

    if (editId) {
      document.getElementById('page-title').textContent = 'Modifier la publication';
      document.getElementById('submit-btn').textContent = 'Enregistrer';
      fetch(`/api/publications/${editId}`).then(r => r.json()).then(pub => {
        document.getElementById('title').value = pub.title || '';
        document.getElementById('type').value = pub.type || 'recherche';
        document.getElementById('summary').value = pub.summary || '';
        document.getElementById('explanation').value = pub.explanation || '';
        document.getElementById('code_snippet').value = pub.code_snippet || '';
        document.getElementById('code_language').value = pub.code_language || 'Python';
        document.getElementById('tags').value = Array.isArray(pub.tags) ? pub.tags.join(', ') : '';
        document.getElementById('pdf_url').value = pub.pdf_url || '';
      });
    }

    // Upload fichier automatique au choix
    document.getElementById('file-upload').addEventListener('change', async function() {
      const file = this.files[0];
      if (!file) return;
      const status = document.getElementById('upload-status');
      status.textContent = 'Upload en cours…';
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form });
        const data = await res.json();
        if (res.ok) {
          if (data.type === 'pdf') document.getElementById('pdf_url').value = data.url;
          status.textContent = `✓ Fichier uploadé : ${data.url}`;
        } else {
          status.textContent = data.error || 'Erreur upload.';
        }
      } catch {
        status.textContent = 'Erreur réseau.';
      }
    });

    async function save() {
      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('save-status');
      const title = document.getElementById('title').value.trim();
      const summary = document.getElementById('summary').value.trim();

      if (!title || !summary) {
        status.textContent = 'Le titre et le résumé sont requis.';
        status.style.color = '#c0392b';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Enregistrement…';
      status.style.color = 'var(--text-muted)';

      const body = {
        title,
        summary,
        explanation: document.getElementById('explanation').value.trim(),
        code_snippet: document.getElementById('code_snippet').value.trim(),
        code_language: document.getElementById('code_language').value.trim() || 'Python',
        tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean),
        type: document.getElementById('type').value,
        pdf_url: document.getElementById('pdf_url').value.trim(),
      };

      try {
        const url = editId ? `/api/publications/${editId}` : '/api/publications';
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          const data = await res.json();
          status.textContent = data.error || 'Erreur.';
          status.style.color = '#c0392b';
          btn.disabled = false;
        }
      } catch {
        status.textContent = 'Erreur réseau.';
        status.style.color = '#c0392b';
        btn.disabled = false;
      }
    }

    function logout() { localStorage.clear(); window.location.href = '/admin/login.html'; }
  </script>
</body>
</html>
